<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP-CBAC Admin | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container glass-panel">
        <div class="login-header">
            <h1>SP-CBAC Security Operations Center</h1>
            <p>Administrator Access Only</p>
        </div>
        
        {% if error %}
        <div class="alert error-alert">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/admin-login" class="login-form">
            <div class="form-group">
                <label for="username">Administrator ID</label>
                <input type="text" id="username" name="username" placeholder="Enter Admin ID" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn primary-btn">Authenticate</button>
            <div style="text-align: center; margin-top: 1.25rem;">
                <a href="/login" class="text-sm text-gray" style="text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">Are you a Crowdsensing Stakeholder? Access Portal here ↗</a>
            </div>
        </form>
    </div>
</body>
</html>
